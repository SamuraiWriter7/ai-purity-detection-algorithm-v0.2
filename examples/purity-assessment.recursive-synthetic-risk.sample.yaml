purity_assessment:
  id: "purity_assessment_recursive_synthetic_risk_001"
  epicenter_id: "epicenter_recursive_synthetic_001"
  assessed_at: "2026-05-25T00:00:00Z"
  method: "hybrid"
  version: "0.1.0"

  assessor:
    type: "multi_wing_review"
    system_id: "ai-purity-detection-algorithm"
    reviewer_notes: "Assessment indicates high recursive synthetic risk due to weak primary-source provenance, strong AI-pattern similarity, and low structural originality."

  signals:
    provenance_evidence_score:
      value: 0.18
      basis:
        - "primary_source_not_identified"
        - "publication_timestamp_unverified"
        - "source_chain_unclear"

    author_declaration_score:
      value: 0.35
      basis:
        - "creator_declaration_partial"
        - "ai_assistance_level_not_clearly_disclosed"

    structural_originality_score:
      value: 0.22
      basis:
        - "generic_summary_structure_detected"
        - "limited_original_framework_detected"
        - "low_conceptual_distinctiveness"

    revision_lineage_score:
      value: 0.15
      basis:
        - "revision_history_unavailable"
        - "no_clear_version_chain"
        - "possible_rewritten_derivative_source"

    citation_transparency_score:
      value: 0.20
      basis:
        - "citation_chain_shallow"
        - "external_dependencies_unclear"
        - "possible_summary_of_secondary_sources"

    ai_pattern_risk_score:
      value: 0.86
      basis:
        - "strong_ai_generated_rhetorical_pattern_detected"
        - "repeated_explanatory_scaffolding"
        - "high_template_similarity"
        - "low_specificity_in_source_claims"

  outputs:
    origin_purity_score:
      value: 0.24
      confidence: 0.61
      interpretation: "low_origin_recursive_synthetic_risk_review_required"

    ai_generated_ratio:
      value: 0.81
      confidence: 0.68
      interpretation: "likely_ai_primary_or_recursively_ai_rewritten"

    warning_flags:
      - "missing_provenance"
      - "high_ai_pattern_similarity"
      - "recursive_synthetic_risk"
      - "origin_unclear"
      - "review_required"
      - "royalty_readiness_blocked"

  review:
    required: true
    recommended: true
    reason: "High recursive synthetic risk and unclear origin require review before downstream use or royalty-readiness transition."

  downstream_use:
    rag_indexing:
      allowed: "conditional"
      notes: "May be indexed only with strong uncertainty metadata and recursive synthetic risk warnings."

    training_use:
      allowed: false
      notes: "Training use should be blocked until primary-source provenance and recursive synthetic risk are reviewed."

    royalty_readiness:
      status: "blocked"
      notes: "Royalty-readiness transition is blocked because the source may be recursively synthetic and lacks sufficient provenance."

    collapse_monitoring:
      include: true
      notes: "Include as a high-priority recursive synthetic risk signal for ecosystem-level collapse monitoring."
